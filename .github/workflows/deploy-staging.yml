# Narraza v2 — Staging Deploy workflow
#
# Triggered manually (workflow_dispatch) via GitHub UI.
# Uses environment: staging with approval gates.
# Secrets come from the staging GitHub Environment (not repository-level).
# Untrusted PRs never get staging/production secrets — standard GHA behavior
# when using environments with protection rules.

name: Deploy Staging

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch, tag, or SHA to deploy'
        required: true
        default: 'main'
        type: string
      skip-tests:
        description: 'Skip CI gates (dangerous — only for hotfix)'
        required: false
        default: false
        type: boolean

concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  NODE_VERSION: '22'

jobs:
  # ─────────────────────────────────────────────────────────────
  # Build artifact
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build Release
    runs-on: ubuntu-latest
    if: ${{ !github.event.inputs.skip-tests }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      # Quick CI gate before building
      - run: npx prisma generate --schema prisma/schema.prisma
      - run: npx vitest run --project packages/core --project packages/shared
      - run: npm run architecture

      # Build the release artifact
      - name: Build release artifact
        run: |
          mkdir -p releases
          node deploy/build-release.mjs
        env:
          RELEASE_OUTPUT_DIR: releases
          # Mock AI — no real provider keys needed
          AI_ENABLE_MOCK: 'true'
          DATABASE_URL: postgresql://narraza:narraza@localhost:5432/narraza
          DATABASE_URL_WEB: postgresql://narraza:narraza@localhost:5432/narraza
          DATABASE_URL_WORKER: postgresql://narraza:narraza@localhost:5432/narraza
          DATABASE_URL_OUTBOX: postgresql://narraza:narraza@localhost:5432/narraza
          AUTH_SECRET: staging-build-auth-secret-not-for-production-use-only
          AUTH_URL: http://localhost:3000
          EMAIL_FROM: 'Staging Build <noreply@staging.local>'
          EMAIL_CHALLENGE_PEPPER: staging-build-pepper-not-for-production
          RATE_LIMIT_PEPPER: staging-build-rate-pepper
          SIGNUP_GRANT_MICRO_IDR: '5000000000'
          MAIL_TRANSPORT: file
          MAIL_FILE_DIR: .data/mail
          ARTIFACT_STORAGE_PATH: .data/artifacts

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: narraza-release
          path: releases/
          retention-days: 7

      - name: Upload manifest
        uses: actions/upload-artifact@v4
        with:
          name: release-manifest
          path: releases/release-manifest.json
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # Deploy to staging
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    # This environment has:
    # - Required reviewers (approval gate)
    # - Staging-only secrets (SSH key, DB URL, etc.)
    environment:
      name: staging
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: narraza-release
          path: releases/

      - name: Verify release manifest
        run: |
          if [ ! -f releases/release-manifest.json ]; then
            echo "ERROR: release-manifest.json not found in artifact"
            exit 1
          fi
          echo "Manifest contents:"
          cat releases/release-manifest.json

          # Verify checksum
          TARBALL=$(node -e "
            const m = require('./releases/release-manifest.json');
            console.log(m.artifact);
          ")
          EXPECTED=$(node -e "
            const m = require('./releases/release-manifest.json');
            console.log(m.checksum.value);
          ")
          ACTUAL=$(sha256sum "releases/${TARBALL}" | awk '{print $1}')
          echo "Expected: $EXPECTED"
          echo "Actual:   $ACTUAL"
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "FATAL: Checksum mismatch — aborting deploy"
            exit 1
          fi
          echo "Checksum verified OK"

      # Deploy steps using SSH to staging server
      # Secrets are environment-scoped (staging only)
      - name: Deploy to staging server
        run: |
          echo "Deploying to staging..."
          # In production, this would:
          # 1. SCP the tarball to the staging server
          # 2. SSH and run deploy/release.sh
          # For now, this is a documented placeholder
          #
          # Example (commented out — requires staging server):
          # TARBALL=$(node -e "const m = require('./releases/release-manifest.json'); console.log(m.artifact);")
          # scp "releases/${TARBALL}" "${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}:/opt/narraza/releases/"
          # ssh "${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}" \
          #   "cd /opt/narraza && bash deploy/release.sh releases/${TARBALL}"
          echo "Staging deploy placeholder — server connection not configured yet"
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_USER: ${{ secrets.STAGING_USER }}

  # ─────────────────────────────────────────────────────────────
  # Smoke test (runs against staging URL)
  # ─────────────────────────────────────────────────────────────
  smoke:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: deploy
    if: ${{ success() }}
    steps:
      - name: Smoke test staging
        run: |
          STAGING_URL="${{ secrets.STAGING_URL }}"
          if [ -z "$STAGING_URL" ]; then
            echo "STAGING_URL not configured — skipping smoke tests"
            exit 0
          fi

          echo "Running smoke tests against ${STAGING_URL}..."

          # Health check
          HEALTH=$(curl -s -o /dev/null -w "%{http_code}" "${STAGING_URL}/health")
          if [ "$HEALTH" != "200" ]; then
            echo "FAIL: /health returned ${HEALTH}"
            exit 1
          fi
          echo "PASS: /health = ${HEALTH}"

          # Ready check
          READY=$(curl -s "${STAGING_URL}/ready")
          echo "Ready response: $READY"
          STATUS=$(echo "$READY" | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{const j=JSON.parse(d);console.log(j.status);})")
          if [ "$STATUS" != "ready" ]; then
            echo "FAIL: /ready status is '${STATUS}'"
            exit 1
          fi
          echo "PASS: /ready = ${STATUS}"

          echo "All smoke tests passed!"
        env:
          STAGING_URL: ${{ secrets.STAGING_URL }}
